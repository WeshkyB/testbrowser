<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" />
  <!-- Shield shape - represents protection/privacy -->
  <path d="M256 80 L400 150 L400 280 Q400 380 256 440 Q112 380 112 280 L112 150 Z"
        fill="url(#accent)" opacity="0.9"/>
  <!-- Inner shield highlight -->
  <path d="M256 110 L370 168 L370 275 Q370 358 256 410 Q142 358 142 275 L142 168 Z"
        fill="url(#bg)" opacity="0.85"/>
  <!-- W letter for Weshky -->
  <path d="M180 200 L210 340 L256 260 L302 340 L332 200"
        fill="none" stroke="url(#accent)" stroke-width="24"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Shine effect -->
  <path d="M256 80 L400 150 L400 220 Q300 180 200 200 L112 150 Z"
        fill="url(#shine)" opacity="0.3"/>
</svg>
