<svg xmlns="http://www.w3.org/2000/svg">
  <!-- Weshky Custom Toolbar Icons -->
  <!-- Each icon is in a separate symbol for reuse -->

  <!-- Back arrow -->
  <symbol id="icon-back" viewBox="0 0 20 20">
    <path d="M12.5 15L7.5 10L12.5 5" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Forward arrow -->
  <symbol id="icon-forward" viewBox="0 0 20 20">
    <path d="M7.5 5L12.5 10L7.5 15" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Reload -->
  <symbol id="icon-reload" viewBox="0 0 20 20">
    <path d="M14.5 5.5A6 6 0 104 10" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round"/>
    <path d="M4 5V10H9" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Home -->
  <symbol id="icon-home" viewBox="0 0 20 20">
    <path d="M3 10L10 3.5L17 10" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M5 8.5V16H8.5V12H11.5V16H15V8.5" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Shield (Weshky Shield - ad blocker) -->
  <symbol id="icon-shield" viewBox="0 0 20 20">
    <path d="M10 2L17 5.5V10C17 14 14 17 10 18.5C6 17 3 14 3 10V5.5L10 2Z"
          fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M7 10L9 12L13 8" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Shield blocked -->
  <symbol id="icon-shield-blocked" viewBox="0 0 20 20">
    <path d="M10 2L17 5.5V10C17 14 14 17 10 18.5C6 17 3 14 3 10V5.5L10 2Z"
          fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M7.5 7.5L12.5 12.5M12.5 7.5L7.5 12.5" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- Menu (hamburger) -->
  <symbol id="icon-menu" viewBox="0 0 20 20">
    <path d="M4 6H16M4 10H16M4 14H16" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- New tab -->
  <symbol id="icon-new-tab" viewBox="0 0 20 20">
    <path d="M10 5V15M5 10H15" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- Close tab -->
  <symbol id="icon-close" viewBox="0 0 20 20">
    <path d="M6 6L14 14M14 6L6 14" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- Lock (HTTPS) -->
  <symbol id="icon-lock" viewBox="0 0 20 20">
    <rect x="5" y="9" width="10" height="8" rx="1.5" fill="none"
          stroke="currentColor" stroke-width="1.5"/>
    <path d="M7 9V6.5C7 4.567 8.343 3 10 3C11.657 3 13 4.567 13 6.5V9"
          fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round"/>
  </symbol>

  <!-- Lock open (HTTP) -->
  <symbol id="icon-lock-open" viewBox="0 0 20 20">
    <rect x="5" y="9" width="10" height="8" rx="1.5" fill="none"
          stroke="currentColor" stroke-width="1.5"/>
    <path d="M7 9V6.5C7 4.567 8.343 3 10 3C11.657 3 13 4.567 13 6.5"
          fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round"/>
  </symbol>

  <!-- Downloads -->
  <symbol id="icon-downloads" viewBox="0 0 20 20">
    <path d="M10 3V13M10 13L6 9M10 13L14 9" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M4 15V16.5H16V15" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Bookmarks -->
  <symbol id="icon-bookmark" viewBox="0 0 20 20">
    <path d="M5 3H15V17L10 13.5L5 17V3Z" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Settings -->
  <symbol id="icon-settings" viewBox="0 0 20 20">
    <circle cx="10" cy="10" r="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path d="M10 2V4M10 16V18M18 10H16M4 10H2M15.66 4.34L14.24 5.76M5.76 14.24L4.34 15.66M15.66 15.66L14.24 14.24M5.76 5.76L4.34 4.34"
          fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- Private/Incognito -->
  <symbol id="icon-private" viewBox="0 0 20 20">
    <circle cx="10" cy="8" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path d="M4 17C4 13.686 6.686 11 10 11C13.314 11 16 13.686 16 17"
          fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M3 8.5H7M13 8.5H17" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- Search -->
  <symbol id="icon-search" viewBox="0 0 20 20">
    <circle cx="8.5" cy="8.5" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path d="M12.5 12.5L17 17" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- Split view -->
  <symbol id="icon-split-view" viewBox="0 0 20 20">
    <rect x="2" y="3" width="16" height="14" rx="2" fill="none"
          stroke="currentColor" stroke-width="1.5"/>
    <path d="M10 3V17" fill="none" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- Picture-in-picture -->
  <symbol id="icon-pip" viewBox="0 0 20 20">
    <rect x="2" y="4" width="16" height="12" rx="1.5" fill="none"
          stroke="currentColor" stroke-width="1.5"/>
    <rect x="10" y="9" width="7" height="6" rx="1" fill="none"
          stroke="currentColor" stroke-width="1.5"/>
  </symbol>
</svg>
